<body>
     <div data-aos="fade-up">
        <h2> Registro de Citas</h2>
        <form class="estiloform" id="formRegistro">

            
            <label>Nombre del Paciente: </label><input type="text" id="nombre" placeholder="Nombre Completo">
            <label>Número de teléfono: </label><input type="tel" id="numero" placeholder="Teléfono">
            <label>Correo electrónico: </label><input type="email" id="correo" placeholder="Correo">
            <label>Fecha:</label><input type="text" id="fecha" placeholder="Fecha">
            

           <label>Hora: </label> <select id="hora" style= "width: 70px;">
                <option value="">Hora</option>
                <option value="8:00">8:00</option>
                <option value="9:00">9:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>

            </select>

            <br>


             <label>Servicio: </label><select id="servicio" style="width: 100%;">
                <option value="">Seleccione el servicio</option>
                <option value="Consulta Médica General">Consulta Médica General</option>
                <option value="Laboratorio">Laboratorio</option>
                <option value="Pediatria">Pediatría</option>
                <option value="Nutricion">Nutrición</option>
                <option value="Ginecologia">Ginecología</option>


             
            </select>
            <br>
            <br>

<button type="submit">Registrar</button>
        </form>

            

   <h2 id="tituloHistorial"></h2>

<table class="tablaDatos" id="tablaHistorial" style="display: none;">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Número</th>
            <th>Correo</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Servicio</th>
            <th> <img src="img/borrar.png" alt=""> </th>
        </tr>
    </thead>
    <tbody id="bodyTabla"></tbody>
</table>


    <script src="js/script.js"></script>
</body>
</html>
